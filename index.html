<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Anime Filter Offline</title>
<style>
body{
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:Arial;
}
.container{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  display:inline-block;
}
canvas{
  margin-top:15px;
  max-width:300px;
  border-radius:10px;
}
button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🎨 Anime Filter (Offline)</h1>

<div class="container">
<input type="file" id="upload"><br>
<button onclick="applyAnime()">✨ Convert</button><br>

<canvas id="canvas"></canvas><br>
<button onclick="download()">⬇ Tải ảnh</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").onchange = e=>{
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);
  img.src = url;
};

img.onload = ()=>{
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img,0,0);
};

function applyAnime(){
  ctx.drawImage(img,0,0);

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  for(let i=0;i<data.length;i+=4){
    let r=data[i], g=data[i+1], b=data[i+2];

    // tăng màu (anime style)
    data[i] = Math.min(255, r*1.3);
    data[i+1] = Math.min(255, g*1.2);
    data[i+2] = Math.min(255, b*1.3);

    // làm sáng
    let avg = (r+g+b)/3;
    if(avg > 200){
      data[i] = 255;
      data[i+1] = 255;
      data[i+2] = 255;
    }

    // tăng tương phản
    data[i] = data[i] > 128 ? data[i]+20 : data[i]-20;
    data[i+1] = data[i+1] > 128 ? data[i+1]+20 : data[i+1]-20;
    data[i+2] = data[i+2] > 128 ? data[i+2]+20 : data[i+2]-20;
  }

  ctx.putImageData(imageData,0,0);

  // vẽ viền đơn giản
  ctx.globalAlpha = 0.3;
  ctx.filter = "contrast(200%) grayscale(100%)";
  ctx.drawImage(canvas,0,0);
  ctx.globalAlpha = 1;
  ctx.filter = "none";
}

function download(){
  let link = document.createElement("a");
  link.download = "anime.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
