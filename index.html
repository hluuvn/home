<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Hub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f0f1a, #050510);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 999;
}

.logo {
  font-size: 24px;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
}

.menu a {
  margin-left: 25px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.menu a:hover {
  color: #00f7ff;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1542751371-adc38448a05e") center/cover;
  opacity: 0.15;
}

.hero h1 {
  font-size: 60px;
  color: #00f7ff;
  text-shadow: 0 0 25px #00f7ff;
  z-index: 1;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00f7ff; }
  to { text-shadow: 0 0 30px #00f7ff; }
}

.hero p {
  margin-top: 15px;
  color: #ccc;
  z-index: 1;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: 2px solid #00f7ff;
  background: transparent;
  color: #00f7ff;
  cursor: pointer;
  transition: 0.3s;
  z-index: 1;
}

.btn:hover {
  background: #00f7ff;
  color: black;
  box-shadow: 0 0 20px #00f7ff;
}

/* SECTION */
.section {
  padding: 60px 40px;
}

.section h2 {
  text-align: center;
  margin-bottom: 40px;
  color: #00f7ff;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #222;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.4s;
  position: relative;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  border-color: #00f7ff;
  box-shadow: 0 0 25px #00f7ff33;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  color: #aaa;
  font-size: 14px;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 25px;
  background: #111;
  border-top: 1px solid #222;
  margin-top: 50px;
}

/* RESPONSIVE */
@media(max-width: 768px) {
  .hero h1 {
    font-size: 35px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🎮 ZyGaming</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Games</a>
    <a href="#">Scripts</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>LEVEL UP YOUR GAME</h1>
  <p>Website gaming hiện đại chuẩn hacker 😎</p>
  <button class="btn">Bắt đầu</button>
</div>

<!-- SECTION -->
<div class="section">
  <h2>🔥 Game Hot</h2>

  <div class="cards">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
      <div class="card-content">
        <h3>Cyber Battle</h3>
        <p>Game hành động cực cháy.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1505740106531-4243f3831c78">
      <div class="card-content">
        <h3>Night War</h3>
        <p>Chiến đấu trong bóng tối.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8">
      <div class="card-content">
        <h3>FPS Arena</h3>
        <p>Bắn súng đỉnh cao.</p>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 ZyGaming | Designed by bạn 😎
</div>

</body>
</html>
