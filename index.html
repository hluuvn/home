<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#0a0a14;color:white;height:100vh;display:flex;justify-content:center;align-items:center}

/* LOGIN */
.login{background:#111;padding:20px;border:1px solid #00f7ff;text-align:center}
input{padding:10px;width:200px;border:none}
button{padding:10px;background:#00f7ff;border:none;margin-top:10px;cursor:pointer}

/* APP */
.app{display:none;width:800px;height:500px;background:#111;border:1px solid #00f7ff;display:flex}

/* USERS */
.users{width:25%;border-right:1px solid #222;padding:10px}
.user{padding:5px;margin-bottom:5px}

/* CHAT */
.chat{width:75%;display:flex;flex-direction:column}
.chat-box{flex:1;padding:10px;overflow-y:auto}
.msg{margin-bottom:10px}
.time{font-size:10px;color:#aaa}
.bubble{background:#222;padding:8px;border-radius:8px;display:inline-block}

/* INPUT */
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;border:none}
.chat-input button{width:80px}
</style>

</head>

<body>

<div class="login" id="loginBox">
 <h3>Login</h3>
 <input id="username" placeholder="Username">
 <button onclick="login()">Vào</button>
</div>

<div class="app" id="app">

 <div class="users">
   <h4>Online</h4>
   <div id="userList"></div>
 </div>

 <div class="chat">
   <div class="chat-box" id="chatBox"></div>

   <div class="chat-input">
     <input id="msgInput" placeholder="Nhắn gì đó...">
     <button onclick="sendMsg()">Gửi</button>
   </div>
 </div>

</div>

<script>

/* REALTIME CHANNEL */
const channel = new BroadcastChannel("chat");

/* DATA */
let users = JSON.parse(localStorage.getItem("users")) || [];
let chatData = JSON.parse(localStorage.getItem("chat")) || [];

/* LOGIN */
function login(){
 let u = username.value.trim();
 if(!u) return alert("Nhập tên 😐");

 if(!users.includes(u)) users.push(u);

 localStorage.setItem("users", JSON.stringify(users));
 localStorage.setItem("session", u);

 start(u);

 channel.postMessage({type:"join", user:u});
}

/* START */
function start(user){
 loginBox.style.display="none";
 app.style.display="flex";
 renderUsers();
 renderChat();
}

/* AUTO LOGIN */
let session = localStorage.getItem("session");
if(session) start(session);

/* USERS */
function renderUsers(){
 userList.innerHTML="";
 users.forEach(u=>{
  let div=document.createElement("div");
  div.className="user";
  div.innerText="● "+u;
  userList.appendChild(div);
 });
}

/* TIME */
function time(){
 let d=new Date();
 return d.getHours()+":"+d.getMinutes();
}

/* BOT AI */
function botReply(text){
 text = text.toLowerCase();

 if(text.includes("hello") || text.includes("hi"))
  return "🤖 Xin chào bro 😎";

 if(text.includes("game"))
  return "🤖 Game hay nhất là FPS Elite 🔥";

 if(text.includes("ai"))
  return "🤖 Tôi là AI fake nhưng khá thông minh 😏";

 return "🤖 Tôi chưa hiểu nhưng vẫn rep 😅";
}

/* CHAT */
function renderChat(){
 chatBox.innerHTML="";
 chatData.forEach(m=>{
  let div=document.createElement("div");
  div.className="msg";

  div.innerHTML=`
   <b>${m.user}</b>
   <div class="bubble">${m.text}</div>
   <div class="time">${m.time}</div>
  `;

  chatBox.appendChild(div);
 });

 chatBox.scrollTop=chatBox.scrollHeight;
}

/* SEND */
function sendMsg(){
 let text = msgInput.value.trim();
 let user = localStorage.getItem("session");

 if(!text) return;

 let msg = {user,text,time:time()};

 chatData.push(msg);
 localStorage.setItem("chat", JSON.stringify(chatData));

 channel.postMessage({type:"msg", data:msg});

 msgInput.value="";
 renderChat();

 /* BOT */
 setTimeout(()=>{
  let reply = {
   user:"AI Bot",
   text:botReply(text),
   time:time()
  };

  chatData.push(reply);
  localStorage.setItem("chat", JSON.stringify(chatData));
  channel.postMessage({type:"msg", data:reply});
  renderChat();

 },1000);

}

/* RECEIVE REALTIME */
channel.onmessage = (e)=>{
 if(e.data.type==="msg"){
  chatData.push(e.data.data);
  localStorage.setItem("chat", JSON.stringify(chatData));
  renderChat();
 }

 if(e.data.type==="join"){
  if(!users.includes(e.data.user)){
   users.push(e.data.user);
   localStorage.setItem("users", JSON.stringify(users));
   renderUsers();
  }
 }
};

/* ENTER */
msgInput?.addEventListener("keypress", e=>{
 if(e.key==="Enter") sendMsg();
});

</script>

</body>
</html>
