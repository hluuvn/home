<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}

body{
 background:#0a0a14;
 color:white;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}

/* LOGIN */
.login{
 background:#111;
 padding:25px;
 border:1px solid #00f7ff;
 text-align:center;
}
input{padding:10px;width:200px;margin-top:10px;border:none}
button{padding:10px;border:none;background:#00f7ff;cursor:pointer;margin-top:10px}

/* MAIN */
.app{
 display:none;
 width:700px;
 height:500px;
 background:#111;
 border:1px solid #00f7ff;
 display:flex;
}

/* USERS */
.users{
 width:30%;
 border-right:1px solid #222;
 padding:10px;
}
.user{
 padding:5px;
 margin-bottom:5px;
 background:#0f172a;
}

/* CHAT */
.chat{
 width:70%;
 display:flex;
 flex-direction:column;
}

.chat-box{
 flex:1;
 padding:10px;
 overflow-y:auto;
}

.msg{
 margin-bottom:10px;
}

.bubble{
 padding:8px;
 border-radius:8px;
 display:inline-block;
}

.time{
 font-size:10px;
 color:#aaa;
}

.chat-input{
 display:flex;
}

.chat-input input{
 flex:1;
 padding:10px;
 border:none;
}

.chat-input button{
 width:80px;
}

/* COLORS */
.c1{color:#00f7ff}
.c2{color:#ff4d4d}
.c3{color:#0f0}
.c4{color:#ffcc00}
</style>

</head>

<body>

<div class="login" id="loginBox">
 <h3>Login</h3>
 <input id="username" placeholder="Username">
 <button onclick="login()">Vào</button>
</div>

<div class="app" id="app">

 <!-- USERS -->

 <div class="users">
   <h4>Online</h4>
   <div id="userList"></div>
   <button onclick="clearChat()">🧹 Clear</button>
 </div>

 <!-- CHAT -->

 <div class="chat">
   <div class="chat-box" id="chatBox"></div>

   <div class="chat-input">
     <input id="msgInput" placeholder="Nhắn gì đó...">
     <button onclick="sendMsg()">Gửi</button>
   </div>
 </div>

</div>

<script>

/* USER COLORS */
const colors = ["c1","c2","c3","c4"];

/* DATABASE */
let users = JSON.parse(localStorage.getItem("users")) || ["Admin","Player","Guest"];
let chatData = JSON.parse(localStorage.getItem("chat")) || [];

/* LOGIN */
function login(){
 let u = username.value.trim();
 if(!u) return alert("Nhập tên 😐");

 if(!users.includes(u)) users.push(u);

 localStorage.setItem("users", JSON.stringify(users));
 localStorage.setItem("session", u);

 start(u);
}

/* START */
function start(user){
 loginBox.style.display="none";
 app.style.display="flex";

 renderUsers();
 renderChat();
}

/* AUTO LOGIN */
let session = localStorage.getItem("session");
if(session) start(session);

/* USERS LIST */
function renderUsers(){
 userList.innerHTML="";
 users.forEach((u,i)=>{
  let div=document.createElement("div");
  div.className="user "+colors[i%colors.length];
  div.innerText = "● " + u;
  userList.appendChild(div);
 });
}

/* TIME */
function getTime(){
 let d=new Date();
 return d.getHours()+":"+d.getMinutes();
}

/* CHAT */
function renderChat(){
 chatBox.innerHTML="";
 chatData.forEach(m=>{
  let div=document.createElement("div");
  div.className="msg";

  div.innerHTML = `
   <div class="${m.color}"><b>${m.user}</b></div>
   <div class="bubble">${m.text}</div>
   <div class="time">${m.time}</div>
  `;

  chatBox.appendChild(div);
 });

 chatBox.scrollTop = chatBox.scrollHeight;
}

/* SEND */
function sendMsg(){
 let text = msgInput.value.trim();
 let user = localStorage.getItem("session");

 if(!text) return;

 let color = colors[Math.floor(Math.random()*colors.length)];

 chatData.push({
  user,
  text,
  time:getTime(),
  color
 });

 localStorage.setItem("chat", JSON.stringify(chatData));

 msgInput.value="";
 renderChat();
}

/* CLEAR */
function clearChat(){
 if(confirm("Xoá chat?")){
  chatData=[];
  localStorage.removeItem("chat");
  renderChat();
 }
}

/* ENTER */
msgInput?.addEventListener("keypress", e=>{
 if(e.key==="Enter") sendMsg();
});

</script>

</body>
</html>
