<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyGaming Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#0a0a14;color:white;overflow-x:hidden}

/* LOADING */
#loader{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.loader-text{
 color:#00f7ff;
 font-size:30px;
 animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0}}

/* PARTICLE */
canvas{
 position:fixed;
 top:0;
 left:0;
 z-index:-1;
}

/* NAV */
.navbar{
 display:flex;
 justify-content:space-between;
 padding:20px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
}
.logo{color:#00f7ff;font-size:22px}
.menu button{
 margin-left:10px;
 padding:8px 15px;
 background:#00f7ff;
 border:none;
 cursor:pointer;
}

/* HERO */
.hero{text-align:center;padding:80px 20px}
.hero h1{color:#00f7ff}

/* CARDS */
.cards{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
 padding:20px;
}
.card{
 background:#111;
 padding:20px;
 cursor:pointer;
 transition:0.3s;
}
.card:hover{
 transform:scale(1.05);
 box-shadow:0 0 20px #00f7ff;
}

/* POPUP */
.popup{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:30px;
 display:none;
 z-index:999;
}
.popup button{margin-top:10px}

/* AUTH */
.auth{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:20px;
 display:none;
 z-index:999;
}
input{
 display:block;
 margin:10px 0;
 padding:8px;
 width:200px;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader"><div class="loader-text">LOADING...</div></div>

<canvas id="particles"></canvas>

<!-- NAV -->
<div class="navbar">
 <div class="logo">🎮 ZyGaming</div>
 <div class="menu">
   <button onclick="openLogin()">Login</button>
   <button onclick="openRegister()">Register</button>
 </div>
</div>

<!-- HERO -->
<div class="hero">
 <h1>LEVEL 3 GAMING WEBSITE</h1>
 <p>Fake API + Popup + Effects 😈</p>
</div>

<!-- CARDS -->
<div class="cards" id="gameList"></div>

<!-- POPUP GAME -->
<div class="popup" id="popup">
 <h2 id="gameTitle"></h2>
 <p>Đây là thông tin game (fake API)</p>
 <button onclick="closePopup()">Đóng</button>
</div>

<!-- LOGIN -->
<div class="auth" id="loginBox">
 <h3>Login</h3>
 <input placeholder="Username">
 <input placeholder="Password" type="password">
 <button onclick="alert('Login giả lập 😎')">Login</button>
</div>

<!-- REGISTER -->
<div class="auth" id="registerBox">
 <h3>Register</h3>
 <input placeholder="Username">
 <input placeholder="Password" type="password">
 <button onclick="alert('Register giả lập 😎')">Register</button>
</div>

<script>

/* LOADING */
window.onload = () => {
 setTimeout(()=>{document.getElementById("loader").style.display="none"},1500)
}

/* PARTICLE */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for(let i=0;i<80;i++){
 particles.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*2,
  d:Math.random()*2
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#00f7ff";
 particles.forEach(p=>{
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fill();
 });
 update();
}
function update(){
 particles.forEach(p=>{
  p.y+=p.d;
  if(p.y>canvas.height) p.y=0;
 });
}
setInterval(draw,30);

/* FAKE API */
const fakeAPI = [
 {name:"Cyber War"},
 {name:"FPS Elite"},
 {name:"Dark Night"}
];

const gameList = document.getElementById("gameList");
fakeAPI.forEach(game=>{
 let div = document.createElement("div");
 div.className="card";
 div.innerHTML = `<h3>${game.name}</h3>`;
 div.onclick = ()=>openGame(game.name);
 gameList.appendChild(div);
});

/* POPUP */
function openGame(name){
 document.getElementById("popup").style.display="block";
 document.getElementById("gameTitle").innerText=name;
}
function closePopup(){
 document.getElementById("popup").style.display="none";
}

/* AUTH */
function openLogin(){
 document.getElementById("loginBox").style.display="block";
}
function openRegister(){
 document.getElementById("registerBox").style.display="block";
}

</script>

</body>
</html>
