<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyGaming Social</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#0a0a14;color:white}

/* NAV */
.navbar{
 display:flex;
 justify-content:space-between;
 padding:15px 25px;
 background:#111;
}
.logo{color:#00f7ff}
.user{color:#0f0}

/* LOGIN */
.login{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:25px;
 z-index:999;
}
input{padding:10px;margin-top:10px;width:220px}
button{
 margin-top:10px;
 padding:8px 15px;
 border:none;
 background:#00f7ff;
 cursor:pointer;
}

/* CONTENT */
.container{padding:20px;display:none}

/* GAME LIST */
.games{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}
.game{
 background:#111;
 padding:15px;
 border:1px solid #222;
}
.rank{
 color:gold;
 font-size:12px;
}

/* CHAT */
.chat{
 position:fixed;
 bottom:0;
 right:0;
 width:300px;
 background:#111;
 border-top:2px solid #00f7ff;
}
.chat-box{
 height:200px;
 overflow-y:auto;
 padding:10px;
 font-size:12px;
}
.msg{margin-bottom:5px}
.chat input{
 width:70%;
 padding:8px;
 border:none;
}
.chat button{
 width:30%;
}

/* SCROLL */
.chat-box::-webkit-scrollbar{width:5px}
.chat-box::-webkit-scrollbar-thumb{background:#00f7ff}
</style>

</head>

<body>

<div class="navbar">
 <div class="logo">🎮 ZyGaming</div>
 <div class="user" id="userBox"></div>
</div>

<!-- LOGIN -->

<div class="login" id="loginBox">
 <h3>Nhập Username</h3>
 <input id="username" placeholder="Username">
 <button onclick="login()">Vào</button>
</div>

<!-- MAIN -->

<div class="container" id="main">

 <h2>🔥 Game List</h2>
 <div class="games" id="gameList"></div>

</div>

<!-- CHAT -->

<div class="chat">
 <div class="chat-box" id="chatBox"></div>
 <div style="display:flex">
  <input id="chatInput" placeholder="Nhắn gì đó...">
  <button onclick="sendMsg()">Gửi</button>
 </div>
</div>

<script>

/* FAKE DATABASE USERS + RANK */
let users = JSON.parse(localStorage.getItem("usersDB")) || {
  "Admin": {rank:"👑 Admin"},
  "Player1": {rank:"🔥 Pro"},
  "Noob": {rank:"🐣 Newbie"}
};

/* LOGIN */
function login(){
 let u = username.value.trim();
 if(!u) return alert("Nhập tên đi 😐");

 if(!users[u]){
  users[u] = {rank:"🎮 Member"};
 }

 localStorage.setItem("usersDB", JSON.stringify(users));
 localStorage.setItem("session", u);

 start(u);
}

/* AUTO LOGIN */
let session = localStorage.getItem("session");
if(session) start(session);

function start(user){
 loginBox.style.display="none";
 main.style.display="block";
 userBox.innerText = user + " - " + users[user].rank;
}

/* FAKE API GAME */
const fakeAPI = [
 {name:"Cyber War"},
 {name:"FPS Elite"},
 {name:"Zombie Mode"},
 {name:"Night Battle"}
];

const gameList = document.getElementById("gameList");
fakeAPI.forEach(g=>{
 let div = document.createElement("div");
 div.className="game";
 div.innerHTML = `<h3>${g.name}</h3><div class="rank">Free</div>`;
 gameList.appendChild(div);
});

/* CHAT SYSTEM */
let chatData = JSON.parse(localStorage.getItem("chat")) || [];

function renderChat(){
 chatBox.innerHTML="";
 chatData.forEach(m=>{
  let div=document.createElement("div");
  div.className="msg";
  div.innerText = m;
  chatBox.appendChild(div);
 });
 chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMsg(){
 let text = chatInput.value;
 let user = localStorage.getItem("session") || "Guest";
 if(!text) return;

 chatData.push(user + ": " + text);
 localStorage.setItem("chat", JSON.stringify(chatData));

 chatInput.value="";
 renderChat();
}

renderChat();

</script>

</body>
</html>
