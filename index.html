<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}

body{
 background:#0a0a14;
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

/* LOGIN */
.login{
 background:#111;
 padding:30px;
 border:1px solid #00f7ff;
 text-align:center;
}
input{
 padding:10px;
 width:200px;
 margin-top:10px;
 border:none;
 outline:none;
}
button{
 margin-top:10px;
 padding:10px;
 width:100%;
 border:none;
 background:#00f7ff;
 cursor:pointer;
}

/* CHAT */
.chat-container{
 display:none;
 width:400px;
 height:500px;
 background:#111;
 border:1px solid #00f7ff;
 display:flex;
 flex-direction:column;
}

.chat-header{
 padding:10px;
 background:#00f7ff;
 color:black;
 text-align:center;
}

.chat-box{
 flex:1;
 padding:10px;
 overflow-y:auto;
}

.msg{
 margin-bottom:8px;
 font-size:14px;
}

.chat-input{
 display:flex;
}

.chat-input input{
 flex:1;
 padding:10px;
 border:none;
}

.chat-input button{
 width:80px;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div class="login" id="loginBox">
 <h2>Nhập Username</h2>
 <input id="username" placeholder="Username">
 <button onclick="login()">Vào Chat</button>
</div>

<!-- CHAT -->

<div class="chat-container" id="chatUI">
 <div class="chat-header" id="chatHeader">Chat Room</div>

 <div class="chat-box" id="chatBox"></div>

 <div class="chat-input">
   <input id="msgInput" placeholder="Nhập tin nhắn...">
   <button onclick="sendMsg()">Gửi</button>
 </div>
</div>

<script>

/* LOAD CHAT DATA */
let chatData = JSON.parse(localStorage.getItem("chatData")) || [];

/* LOGIN */
function login(){
 let user = username.value.trim();
 if(!user) return alert("Nhập username đi 😐");

 localStorage.setItem("user", user);

 loginBox.style.display="none";
 chatUI.style.display="flex";

 chatHeader.innerText = "👤 " + user + " | Chat Room";

 renderChat();
}

/* AUTO LOGIN */
let savedUser = localStorage.getItem("user");
if(savedUser){
 loginBox.style.display="none";
 chatUI.style.display="flex";
 chatHeader.innerText = "👤 " + savedUser + " | Chat Room";
 renderChat();
}

/* RENDER CHAT */
function renderChat(){
 chatBox.innerHTML="";
 chatData.forEach(m=>{
  let div = document.createElement("div");
  div.className="msg";
  div.innerText = m;
  chatBox.appendChild(div);
 });
 chatBox.scrollTop = chatBox.scrollHeight;
}

/* SEND MESSAGE */
function sendMsg(){
 let text = msgInput.value.trim();
 let user = localStorage.getItem("user") || "Guest";

 if(!text) return;

 chatData.push(user + ": " + text);
 localStorage.setItem("chatData", JSON.stringify(chatData));

 msgInput.value="";
 renderChat();
}

/* ENTER KEY */
msgInput?.addEventListener("keypress", function(e){
 if(e.key === "Enter") sendMsg();
});

</script>

</body>
</html>
